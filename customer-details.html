<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ASGate - تفاصيل العميل</title>

  <!-- خطوط -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">

  <!-- ملف التنسيق -->
  <link rel="stylesheet" href="customer-details.css" />
</head>

<body>
  <div class="page">

    <!-- الشريط الجانبي -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-logo">AS</div>
        <div class="brand-text">
          <h1>ASGate</h1>
          <span>إدارة العملاء</span>
        </div>
      </div>

      <button class="back-btn" id="btn-back">← العودة للقائمة</button>
    </aside>

    <!-- المحتوى الرئيسي -->
    <main class="content">

      <!-- العنوان -->
      <header class="topbar">
        <div class="client-title-area">
          <h2 id="c-name">جاري التحميل...</h2>
          <p>نظرة شاملة لبيانات ومتابعات العميل</p>
        </div>
      </header>

      <!-- معلومات العميل -->
      <section class="compact-client-info">
        <div class="info-item"><span>السجل التجاري 1:</span> <strong id="c-cr1">-</strong></div>
        <div class="info-item"><span>السجل التجاري 2:</span> <strong id="c-cr2">-</strong></div>
        <div class="info-item"><span>المدينة:</span> <strong id="c-city">-</strong></div>
        <div class="info-item"><span>الحي:</span> <strong id="c-district">-</strong></div>
        <div class="info-item"><span>المصدر:</span> <strong id="c-source">-</strong></div>
        <div class="info-item"><span>المالك:</span> <strong id="c-owner">-</strong></div>
      </section>

      <!-- مساحة العمل -->
      <div class="workspace">

        <!-- التبويبات -->
        <nav class="compact-tabs">
          <button class="tab-btn active" id="btn-o" data-tab="o-history">الطلبات</button>
          <button class="tab-btn" id="btn-v" data-tab="v-history">الزيارات</button>
          <button class="tab-btn" id="btn-a" data-tab="attachments">المرفقات</button>
        </nav>

        <!-- محتوى التبويبات -->
        <section class="panel tab-content">
          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr id="tableHeadRow">
                  <th>التاريخ</th>
                  <th>العنوان</th>
                  <th>الحالة</th>
                  <th>الملاحظات</th>
                </tr>
              </thead>
              <tbody id="contentBody"></tbody>
            </table>
          </div>
        </section>

        <!-- فريق المتابعة -->
        <section class="panel">
          <div class="panel-head">
            <h3>فريق المتابعة والتواصل</h3>
            <button class="btn btn-primary" id="btn-add-manager">+ إضافة مسؤول</button>
          </div>

          <div class="table-wrap">
            <table class="data-table">
              <thead>
                <tr>
                  <th>الاسم</th>
                  <th>رقم الجوال</th>
                  <th>البريد الإلكتروني</th>
                  <th>جهة الاتصال الأساسية</th>
                  <th>تاريخ الإضافة</th>
                  <th>إجراءات</th>
                </tr>
              </thead>
              <tbody id="managerTableBody"></tbody>
            </table>
          </div>
        </section>

      </div>
    </main>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <!-- Loader -->
  <div id="loader" class="loader" style="display:none;"></div>

  <!-- ملف الجافاسكربت -->
  <script src="customer-details.js"></script>
</body>
</html>
