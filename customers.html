<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASGate - العملاء</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="customers.css">
</head>
<body onload="loadSavedData()">

<div class="dashboard-container">
    <nav class="navbar">
        <a href="index.html">الرئيسية</a>
        <a href="visits.html">الزيارات</a>
        <a href="opportunities.html">الفرص البيعية</a>
        <a href="customers.html" class="active">العملاء</a>
        <a href="sales.html">المبيعات</a>
    </nav>

    <div class="main-content">
        <div class="action-bar">
            <!-- الزر الآن يفتح المربع المنبثق لإضافة عميل داخل نفس الصفحة -->
            <button class="btn-top btn-add" onclick="openAddCustomerModal()"><i class="fas fa-plus"></i> إضافة عميل جديد</button>
            <div class="search-wrapper">
                <input type="text" id="searchInput" class="search-input" placeholder="بحث 🔍" onkeyup="debouncedFilterTable()">
            </div>
            
            <div class="stats-bar-visit">
                <div class="stat-total-wrapper" style="display: flex; gap: 15px; align-items: center;">
                    <div class="stat-item">إجمالي العملاء: <span id="stat-total" class="stat-val">0</span></div>
                    <div class="stat-divider">|</div>
                    <div class="stat-item">عملاء الشهر: <span id="stat-month" class="stat-val">0</span></div>
                    <div class="stat-divider">|</div>
                    <div class="stat-item">عملاء اليوم: <span id="stat-today" class="stat-val">0</span></div>
                </div>
            </div>

            <div class="bulk-action-wrapper">
                <button class="btn-bulk-trigger" onclick="toggleDropdown(event, this)">إجراءات جماعية <i class="fas fa-chevron-down" style="font-size:10px;"></i></button>
                <div class="dropdown-menu">
                    <button onclick="handleBulkAction('تصدير')"><i class="fas fa-file-excel"></i> تصدير للإكسيل</button>
                    <button onclick="handleBulkAction('طباعة')"><i class="fas fa-print"></i> طباعة</button>
                    <hr style="border:none; border-top:1px solid #e2e8f0; margin: 4px 0;">
                    <button class="del-btn" onclick="handleBulkAction('حذف')"><i class="fas fa-trash-alt"></i> حذف المحدد</button>
                </div>
            </div>
        </div>
        
        <div class="table-wrapper">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th class="col-select"><input type="checkbox" onclick="toggleAllCheckboxes(this)"></th>
                        <th class="col-code">كود العميل</th>
                        <th class="col-company">اسم الشركة</th>
                        <th class="col-address">العنوان</th> 
                        <th class="col-manager">المسؤول الرئيسي</th>
                        <th class="col-mobile">رقم التواصل</th>
                        <th class="col-email">البريد الالكتروني</th>
                        <th class="col-date">تاريخ الانشاء</th>
                        <th class="col-class">تصنيف العميل</th>
                        <th class="col-notes">الملاحظات</th>
                        <th class="col-status">حالة العميل</th>
                        <th class="col-owner">المالك</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>

        <div id="activityLogSection" class="activity-log-section">
            <div class="activity-log-header-container">
                <div class="activity-log-title"><i class="fas fa-history"></i> سجل نشاط العملاء</div>
                <button id="toggleExpandBtn" class="btn-toggle-expand" onclick="toggleLogExpansion()" title="توسيع / تقليص"><i class="fas fa-expand-alt"></i></button>
            </div>
            <div id="activityList" class="activity-list"></div>
        </div>
    </div>
</div>

<!-- مربع الملاحظات -->
<div id="noteModal" class="modal-notes">
    <div class="modal-notes-content">
        <div style="font-weight: 800; color: #1e293b; font-size:14px; margin-bottom: 15px; display:flex; align-items:center; gap:8px;">
            <i class="fas fa-sticky-note" style="color:var(--accent-blue)"></i> سجل ملاحظات العميل
        </div>
        <div id="historyLog" class="history-log"></div>
        <textarea id="modalTextArea" class="note-area" placeholder="أدخل تفاصيل الملاحظة هنا..."></textarea>
        <div style="display:flex; justify-content: flex-end; gap:10px; margin-top:15px;">
            <button onclick="closeNote()" style="background:#f1f5f9; border:1px solid #cbd5e1; color:#475569; padding:8px 20px; border-radius:6px; cursor:pointer; font-family:Cairo; font-size:11.5px; font-weight:700;">إلغاء</button>
            <button onclick="saveNote()" style="background:var(--accent-blue); border:none; color:white; padding:8px 20px; border-radius:6px; cursor:pointer; font-family:Cairo; font-size:11.5px; font-weight:800; box-shadow: 0 2px 4px rgba(59,130,246,0.3);">حفظ الملاحظة</button>
        </div>
    </div>
</div>

<!-- مربع إضافة عميل جديد -->
<div id="addCustomerModal" class="modal-notes" style="display:none; align-items:center; justify-content:center; position:fixed; z-index:9999; top:0; left:0; width:100%; height:100%; background:rgba(15,23,42,0.6); backdrop-filter:blur(4px);">
    <div style="background:white; padding:25px; border-radius:12px; width:700px; max-height:90vh; overflow-y:auto; border:1px solid var(--border-soft); box-shadow:0 10px 25px rgba(0,0,0,0.1);">
        <div style="font-size:16px; font-weight:800; color:#2e1065; border-bottom:2px solid var(--border-soft); padding-bottom:10px; margin-bottom:20px;">
            <i class="fas fa-user-plus"></i> إضافة عميل جديد
        </div>
        
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
            <div style="display:flex; flex-direction:column; gap:5px;">
                <label style="font-size:11.5px; font-weight:700; color:var(--text-dark);">كود العميل</label>
                <input type="text" id="addCode" readonly style="height:38px; padding:0 12px; border-radius:6px; border:1px solid #cbd5e1; background:#f1f5f9; font-weight:800; outline:none; font-family:'Cairo';">
            </div>
            <div style="display:flex; flex-direction:column; gap:5px;">
                <label style="font-size:11.5px; font-weight:700; color:var(--text-dark);">تاريخ الانشاء</label>
                <input type="text" id="addDate" readonly style="height:38px; padding:0 12px; border-radius:6px; border:1px solid #cbd5e1; background:#f1f5f9; font-weight:800; outline:none; font-family:'Cairo';">
            </div>

            <div style="grid-column:span 2; display:flex; flex-direction:column; gap:5px;">
                <label style="font-size:11.5px; font-weight:700; color:var(--text-dark);">اسم الشركة</label>
                <input type="text" id="addComp" style="height:38px; padding:0 12px; border-radius:6px; border:1px solid #cbd5e1; outline:none; font-family:'Cairo';">
            </div>

            <div style="display:flex; flex-direction:column; gap:5px;">
                <label style="font-size:11.5px; font-weight:700; color:var(--text-dark);">المدينة</label>
                <input type="text" id="addCity" style="height:38px; padding:0 12px; border-radius:6px; border:1px solid #cbd5e1; outline:none; font-family:'Cairo';">
            </div>
            <div style="display:flex; flex-direction:column; gap:5px;">
                <label style="font-size:11.5px; font-weight:700; color:var(--text-dark);">العنوان</label>
                <input type="text" id="addAddress" style="height:38px; padding:0 12px; border-radius:6px; border:1px solid #cbd5e1; outline:none; font-family:'Cairo';">
            </div>

            <div style="display:flex; flex-direction:column; gap:5px;">
                <label style="font-size:11.5px; font-weight:700; color:var(--text-dark);">رقم السجل الرئيسي</label>
                <input type="text" id="addMainCR" style="height:38px; padding:0 12px; border-radius:6px; border:1px solid #cbd5e1; outline:none; font-family:'Cairo';">
            </div>
            <div style="display:flex; flex-direction:column; gap:5px;">
                <label style="font-size:11.5px; font-weight:700; color:var(--text-dark);">رقم السجل</label>
                <input type="text" id="addSubCR" style="height:38px; padding:0 12px; border-radius:6px; border:1px solid #cbd5e1; outline:none; font-family:'Cairo';">
            </div>

            <div style="display:flex; flex-direction:column; gap:5px;">
                <label style="font-size:11.5px; font-weight:700; color:var(--text-dark);">المسؤول</label>
                <input type="text" id="addManager" style="height:38px; padding:0 12px; border-radius:6px; border:1px solid #cbd5e1; outline:none; font-family:'Cairo';">
            </div>
            <div style="display:flex; flex-direction:column; gap:5px;">
                <label style="font-size:11.5px; font-weight:700; color:var(--text-dark);">رقم التواصل</label>
                <input type="text" id="addMob" style="height:38px; padding:0 12px; border-radius:6px; border:1px solid #cbd5e1; outline:none; font-family:'Cairo';" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
            </div>

            <div style="display:flex; flex-direction:column; gap:5px;">
                <label style="font-size:11.5px; font-weight:700; color:var(--text-dark);">البريد الالكتروني</label>
                <input type="email" id="addEmail" style="height:38px; padding:0 12px; border-radius:6px; border:1px solid #cbd5e1; outline:none; font-family:'Cairo';">
            </div>
            <div style="display:flex; flex-direction:column; gap:5px;">
                <label style="font-size:11.5px; font-weight:700; color:var(--text-dark);">انشأ بواسطة</label>
                <input type="text" id="addCreator" style="height:38px; padding:0 12px; border-radius:6px; border:1px solid #cbd5e1; outline:none; font-family:'Cairo';">
            </div>
        </div>

        <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:25px;">
            <button onclick="closeAddCustomerModal()" style="background:#f1f5f9; border:1px solid #cbd5e1; padding:8px 25px; border-radius:6px; font-family:'Cairo'; font-size:12px; font-weight:700; cursor:pointer;">إلغاء</button>
            <button onclick="saveNewCustomer()" style="background:#3b82f6; color:white; border:none; padding:8px 30px; border-radius:6px; font-family:'Cairo'; font-size:12px; font-weight:800; cursor:pointer; box-shadow:0 2px 4px rgba(59,130,246,0.3);"><i class="fas fa-save"></i> حفظ</button>
        </div>
    </div>
</div>

<script src="customers.js"></script>
</body>
</html>
